# PostgreSQL 17 configuration for 2 GB RAM container
# Optimized for multi-tenant application with RLS

# Connection settings
max_connections = 50
superuser_reserved_connections = 3

# Memory settings (for 2 GB container)
shared_buffers = 512MB
effective_cache_size = 1536MB
work_mem = 16MB
maintenance_work_mem = 128MB
huge_pages = off

# Background writer
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 100
bgwriter_lru_multiplier = 2.0

# WAL settings
wal_buffers = 64MB
checkpoint_completion_target = 0.9
max_wal_size = 1GB
min_wal_size = 256MB

# Query planner
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# Logging (for debugging, reduce in production)
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on

# Locale
lc_messages = 'en_US.UTF-8'

# Listen address (for Docker networking)
listen_addresses = '*'
port = 5432
