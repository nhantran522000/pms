services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: pms-api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      # Memory tuning for 8 GB VPS
      - NODE_OPTIONS=--max-old-space-size=4096
      - DATABASE_URL=postgresql://pms:pms_password@db:5432/pms?connection_limit=10&pool_timeout=30
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 512M
    networks:
      - pms-network
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "3"

  db:
    image: postgres:17-alpine
    container_name: pms-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=pms
      - POSTGRES_PASSWORD=pms_password
      - POSTGRES_DB=pms
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pms -d pms"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 256M
    networks:
      - pms-network
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: pms-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    networks:
      - pms-network
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "3"

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  pms-network:
    driver: bridge
